<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>EventVault — Create Event</title>
    <link
      rel="stylesheet"
      href="css/style.css"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">
        <span class="brand-icon">🎟️</span>
        <h1>EventVault</h1>
      </div>

      <div class="navbar-actions">
        <button
          class="btn btn-ghost btn-sm"
          onclick="goBack()"
        >
          ← Back to Dashboard
        </button>
      </div>
    </nav>

    <!-- Content -->
    <div class="create-page">
      <div class="page-header">
        <h1>Create an Event</h1>
        <p>Fill in the details below to publish your event.</p>
      </div>

      <div class="create-form-card">
        <div class="form-grid">
          <div class="form-group full">
            <label>Event Name</label>
            <input
              type="text"
              id="name"
              placeholder="Event name"
            />
          </div>

          <div class="form-group full">
            <label>Description</label>
            <input
              type="text"
              id="description"
              placeholder="Description"
            />
          </div>

          <div class="form-group full">
            <label>Venue</label>
            <input
              type="text"
              id="venue"
              placeholder="Venue"
            />
          </div>
          <div class="form-group full">
            <label for="imageUrl">Event Image URL</label>
            <input
              type="text"
              id="imageUrl"
              placeholder="https://up.yimg.com/ib/th/id/OIP.xPBR0O2CJgukD2fUNDdrggHaFF?pid=Api&rs=1&c=1&qlt=95&w=153&h=105"
            />
          </div>

          <div class="form-group">
            <label>Date & Time</label>
            <input
              type="datetime-local"
              id="eventDate"
            />
          </div>

          <div class="form-group">
            <label>Price</label>
            <input
              type="number"
              id="price"
              min="1"
            />
          </div>

          <div class="form-group">
            <label>Total Seats</label>
            <input
              type="number"
              id="totalSeats"
              min="1"
            />
          </div>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <button
            class="btn btn-primary"
            style="flex: 1"
            onclick="createNewEvent()"
            id="createBtn"
          >
            Publish Event
          </button>

          <button
            class="btn btn-ghost"
            onclick="goBack()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="toast"
    ></div>

    <!-- Loader -->
    <div
      id="loader"
      class="loader-overlay hidden"
    >
      <div class="spinner"></div>
    </div>

    <!-- Script -->
    <script src="js/create-event.js"></script>
  </body>
</html>
